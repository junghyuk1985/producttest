<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday, Yujoo!</title>
  <meta name="description" content="A tiny birthday note for Yujoo with the latest portrait." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Happy Birthday, Yujoo!" />
  <meta property="og:description" content="A tiny birthday note for Yujoo with the latest portrait." />
  <meta property="og:url" content="https://junghyuk1985.github.io/producttest/" />
  <meta property="og:image" content="https://junghyuk1985.github.io/producttest/image.png?v=20260316" />
  <meta property="og:image:alt" content="Yujoo smiling softly" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Happy Birthday, Yujoo!" />
  <meta name="twitter:description" content="A tiny birthday note for Yujoo with the latest portrait." />
  <meta name="twitter:image" content="https://junghyuk1985.github.io/producttest/image.png?v=20260316" />
  <link rel="canonical" href="https://junghyuk1985.github.io/producttest/" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="./style.css" rel="stylesheet">
</head>
<body>
  <main class="card-shell">
    <section class="card" aria-labelledby="birthday-title">
      <div class="sky sky-left"></div>
      <div class="sky sky-right"></div>

      <p class="eyebrow">A tiny birthday note</p>
      <h1 id="birthday-title">Happy 8th Birthday, Yujoo!</h1>
      <p class="message">
        You are 8 today. Have the happiest day with donut, fun, and lots of smiles.
      </p>
      <p class="signature">From your daddy.</p>

      <button class="cheer-button" type="button">Tap for more sparkles</button>

      <div class="characters" aria-hidden="true">
        <div class="portrait-badge">
          <div class="portrait-ring">
            <img class="portrait-image" src="./image.png" alt="Yujoo smiling softly" />
          </div>
        </div>
        <div class="star star-one"></div>
        <div class="star star-two"></div>
        <div class="star star-three"></div>
      </div>

      <div class="confetti" aria-hidden="true"></div>
    </section>
  </main>

  <script defer src="./main.js"></script>
</body>
</html>
